<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uniline Logistics — Undruv bo'limi</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }
  .header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 1.5rem; }
  .logo { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  .logo span { color: #1D9E75; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .sc { background: #fff; border-radius: 10px; border: 1px solid #e8e8e4; padding: 12px 14px; }
  .sl { font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
  .sv { font-size: 20px; font-weight: 600; color: #1a1a1a; }
  .sv.grn { color: #0F6E56; } .sv.red { color: #A32D2D; } .sv.amb { color: #854F0B; }
  .ctrls { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .ctrls input, .ctrls select { font-size: 13px; padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; outline: none; }
  .ctrls input:focus, .ctrls select:focus { border-color: #1D9E75; }
  .ctrls input { flex: 1; min-width: 160px; }
  .btn { font-size: 13px; padding: 8px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; }
  .btn:hover { background: #f5f5f0; }
  .btn-g { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .btn-g:hover { background: #0F6E56; }
  .tw { overflow-x: auto; border: 1px solid #e8e8e4; border-radius: 12px; background: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f9f9f7; color: #888; font-weight: 600; text-align: left; padding: 10px 12px; border-bottom: 1px solid #e8e8e4; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 1px solid #f0f0ec; color: #1a1a1a; vertical-align: middle; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf8; }
  .b { display: inline-block; padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .b-full { background: #EAF3DE; color: #3B6D11; }
  .b-qism { background: #FAEEDA; color: #854F0B; }
  .dp-red { color: #A32D2D; font-weight: 600; }
  .dp-ok { color: #3B6D11; }
  .late { color: #A32D2D; font-weight: 600; }
  .empty { text-align: center; color: #aaa; padding: 2.5rem; font-size: 13px; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 14px; border: 1px solid #e8e8e4; padding: 1.5rem; width: 340px; max-width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
  .modal label { font-size: 12px; color: #888; display: block; margin-top: 12px; margin-bottom: 4px; }
  .modal input, .modal select { width: 100%; font-size: 13px; padding: 8px 10px; border-radius: 8px; border: 1px solid #ddd; background: #f9f9f7; color: #1a1a1a; outline: none; }
  .modal input:focus, .modal select:focus { border-color: #1D9E75; background: #fff; }
  .hint { font-size: 11px; color: #888; margin-top: 4px; }
  .hint.warn { color: #854F0B; }
  .hint.ok { color: #0F6E56; }
  .mbtns { display: flex; gap: 8px; margin-top: 1.25rem; justify-content: flex-end; }
  .del-btn { margin-right: auto; color: #A32D2D; border-color: #f7c1c1; }
  .del-btn:hover { background: #FCEBEB; }
  @media (max-width: 600px) {
    .header { flex-direction: column; align-items: flex-start; }
    th, td { font-size: 12px; padding: 8px 8px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo"><span>UNILINE</span> Logistics — Undruv bo'limi</div>
    <button class="btn btn-g" onclick="openAdd()"><i class="ti ti-plus"></i> Talaba qo'shish</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="ctrls">
    <input type="text" id="srch" placeholder="Ism yoki telefon..." oninput="render()">
    <select id="flt" onchange="render()">
      <option value="">Barcha holatlar</option>
      <option value="full">To'liq to'lagan</option>
      <option value="qism">Zaklad / qisman</option>
    </select>
    <button class="btn" onclick="exportCSV()"><i class="ti ti-download"></i> CSV</button>
  </div>

  <div class="tw">
    <table>
      <thead><tr>
        <th>Ism familiya</th>
        <th>Telefon</th>
        <th>To'langan</th>
        <th>Qolgan qarz</th>
        <th>Holat</th>
        <th>Muddat</th>
        <th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="mtitle">Yangi talaba</h3>
    <label>Ism familiya</label>
    <input id="f-ism" placeholder="Abdullayev Jasur">
    <label>Telefon</label>
    <input id="f-tel" placeholder="+998 90 000 00 00">
    <label>To'langan summa (so'm)</label>
    <input id="f-tol" type="number" placeholder="0" oninput="calcHolat()">
    <div class="hint" id="hint-holat"></div>
    <div id="sana-row">
      <label>Qolgan qarz to'lov muddati</label>
      <input id="f-sana" type="date">
      <div class="hint warn" id="hint-sana">Zaklad: qachon to'liq to'lashi kerakligini belgilang</div>
    </div>
    <div class="mbtns">
      <button class="btn del-btn" id="delbtn" onclick="deleteEntry()" style="display:none"><i class="ti ti-trash"></i> O'chirish</button>
      <button class="btn" onclick="closeModal()">Bekor</button>
      <button class="btn btn-g" onclick="saveEntry()">Saqlash</button>
    </div>
  </div>
</div>

<script>
const JAMI = 600000;
const KEY = 'ul_data_v2';

function load() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return [
    {id:1,ism:'Karimov Bobur',tel:'+998 90 111 22 33',tolangan:600000,sana:''},
    {id:2,ism:'Toshmatova Nilufar',tel:'+998 93 444 55 66',tolangan:300000,sana:'2026-06-25'},
    {id:3,ism:'Yusupov Sherzod',tel:'+998 97 777 88 99',tolangan:150000,sana:'2026-07-10'},
    {id:4,ism:'Mirzayeva Dildora',tel:'+998 90 222 33 44',tolangan:600000,sana:''},
    {id:5,ism:'Hasanov Otabek',tel:'+998 91 555 66 77',tolangan:200000,sana:'2026-06-10'},
  ];
}

let data = load();
let nid = data.reduce((m,d) => Math.max(m,d.id), 0) + 1;
let eid = null;

function save() { try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e) {} }
function holat(t) { return t >= JAMI ? 'full' : 'qism'; }
function qarz(t) { return Math.max(0, JAMI - t); }
function fmt(n) { return Number(n).toLocaleString('uz-UZ'); }
function today() { return new Date().toISOString().slice(0,10); }

function calcHolat() {
  const t = parseFloat(document.getElementById('f-tol').value) || 0;
  const q = qarz(t);
  const h = holat(t);
  const hintEl = document.getElementById('hint-holat');
  const sanaRow = document.getElementById('sana-row');
  if (h === 'full') {
    hintEl.className = 'hint ok';
    hintEl.textContent = "✓ To'liq to'langan — 600 000 so'm";
    sanaRow.style.display = 'none';
  } else {
    hintEl.className = 'hint warn';
    hintEl.textContent = "Zaklad: " + fmt(t) + " so'm to'langan, " + fmt(q) + " so'm qoldi";
    sanaRow.style.display = 'block';
  }
}

function renderStats() {
  const full = data.filter(d => holat(d.tolangan) === 'full').length;
  const qsm = data.filter(d => holat(d.tolangan) === 'qism').length;
  const totalQ = data.reduce((s,d) => s + qarz(d.tolangan), 0);
  const late = data.filter(d => holat(d.tolangan) === 'qism' && d.sana && d.sana < today()).length;
  document.getElementById('stats').innerHTML = `
    <div class="sc"><div class="sl">Jami talabalar</div><div class="sv">${data.length}</div></div>
    <div class="sc"><div class="sl">To'liq to'lagan</div><div class="sv grn">${full}</div></div>
    <div class="sc"><div class="sl">Zaklad / qisman</div><div class="sv amb">${qsm}</div></div>
    <div class="sc"><div class="sl">Umumiy qarz</div><div class="sv red">${fmt(totalQ)} so'm</div></div>
    <div class="sc"><div class="sl">Muddati o'tgan</div><div class="sv red">${late}</div></div>
  `;
}

function render() {
  renderStats();
  const q = (document.getElementById('srch').value || '').toLowerCase();
  const f = document.getElementById('flt').value;
  const td = today();
  const rows = data.filter(d => {
    const m = d.ism.toLowerCase().includes(q) || d.tel.includes(q);
    const fm = !f || holat(d.tolangan) === f;
    return m && fm;
  });
  const tb = document.getElementById('tbody');
  if (!rows.length) { tb.innerHTML = '<tr><td colspan="7" class="empty">Ma\'lumot topilmadi</td></tr>'; return; }
  tb.innerHTML = rows.map(d => {
    const h = holat(d.tolangan);
    const qr = qarz(d.tolangan);
    const badge = h === 'full' ? '<span class="b b-full">To\'liq</span>' : '<span class="b b-qism">Zaklad</span>';
    const qrzHtml = qr > 0 ? `<span class="dp-red">${fmt(qr)} so'm</span>` : '<span class="dp-ok">—</span>';
    let sanaHtml = '<span style="color:#ccc">—</span>';
    if (h === 'qism') {
      if (d.sana) {
        const late = d.sana < td;
        sanaHtml = `<span class="${late ? 'late' : ''}">${d.sana}${late ? ' ⚠' : ''}</span>`;
      } else {
        sanaHtml = '<span style="color:#A32D2D;font-size:11px">Belgilanmagan</span>';
      }
    }
    return `<tr>
      <td style="font-weight:600">${d.ism}</td>
      <td style="color:#888">${d.tel}</td>
      <td style="color:#0F6E56;font-weight:600">${fmt(d.tolangan)} so'm</td>
      <td>${qrzHtml}</td>
      <td>${badge}</td>
      <td>${sanaHtml}</td>
      <td><button class="btn" style="padding:4px 8px;font-size:12px" onclick="editRow(${d.id})"><i class="ti ti-edit"></i></button></td>
    </tr>`;
  }).join('');
}

function openAdd() {
  eid = null;
  document.getElementById('mtitle').textContent = 'Yangi talaba';
  ['f-ism','f-tel','f-tol','f-sana'].forEach(x => document.getElementById(x).value = '');
  document.getElementById('hint-holat').textContent = '';
  document.getElementById('sana-row').style.display = 'none';
  document.getElementById('delbtn').style.display = 'none';
  document.getElementById('overlay').classList.add('show');
}

function editRow(id) {
  eid = id;
  const d = data.find(x => x.id === id);
  document.getElementById('mtitle').textContent = 'Tahrirlash';
  document.getElementById('f-ism').value = d.ism;
  document.getElementById('f-tel').value = d.tel;
  document.getElementById('f-tol').value = d.tolangan;
  document.getElementById('f-sana').value = d.sana || '';
  document.getElementById('delbtn').style.display = 'inline-flex';
  calcHolat();
  document.getElementById('overlay').classList.add('show');
}

function closeModal() { document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeModal(); });

function saveEntry() {
  const ism = document.getElementById('f-ism').value.trim();
  const tel = document.getElementById('f-tel').value.trim();
  const tol = parseFloat(document.getElementById('f-tol').value) || 0;
  if (!ism || !tel) { alert('Ism va telefon majburiy!'); return; }
  const entry = { id: eid || nid++, ism, tel, tolangan: tol, sana: document.getElementById('f-sana').value || '' };
  if (eid) { const i = data.findIndex(x => x.id === eid); data[i] = entry; }
  else data.push(entry);
  save(); closeModal(); render();
}

function deleteEntry() {
  if (!eid) return;
  if (!confirm('Haqiqatan ham o\'chirasizmi?')) return;
  data = data.filter(x => x.id !== eid);
  save(); closeModal(); render();
}

function exportCSV() {
  const bom = '\uFEFF';
  const h = ['Ism familiya','Telefon','Kurs narxi','Tolangan','Qolgan qarz','Holat','Muddat'];
  const rows = data.map(d => [
    d.ism, d.tel, JAMI, d.tolangan, qarz(d.tolangan),
    holat(d.tolangan) === 'full' ? "To'liq" : 'Zaklad', d.sana || ''
  ].join(','));
  const blob = new Blob([bom + [h.join(','), ...rows].join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'uniline_logistics.csv'; a.click();
}

render();
</script>
</body>
</html>
